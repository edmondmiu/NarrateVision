<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NarrateVision</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: #0a0a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px 24px;
            background: #12122a;
            border-bottom: 1px solid #1e1e3a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 400;
            color: #b8b8d0;
            letter-spacing: 0.05em;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 20px;
            border: 1px solid #3a3a5c;
            background: #1a1a3a;
            color: #c0c0d8;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover { background: #2a2a4a; border-color: #5a5a8c; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn:disabled:hover { background: #1a1a3a; border-color: #3a3a5c; }
        .btn.active { background: #2a1a3a; border-color: #8a4a9c; color: #d0a0e0; }
        .btn.story { background: #1a2a3a; border-color: #4a7a9c; color: #a0d0e0; }
        .btn.story:hover { background: #1a3a4a; }
        .btn.warmup { background: #1a3a1a; border-color: #4a9c4a; color: #a0e0a0; }
        .btn.warmup:hover { background: #1a4a1a; }
        .btn.warmup.ready { opacity: 0.6; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        .canvas-wrap {
            width: 100%;
            max-width: 640px;
            aspect-ratio: 1;
            background: #10102a;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .canvas-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .canvas-wrap img.visible { opacity: 1; }

        .placeholder {
            position: absolute;
            color: #3a3a5c;
            font-size: 18px;
            text-align: center;
            line-height: 1.6;
            padding: 24px;
        }

        .footer {
            padding: 16px 24px;
            background: #12122a;
            border-top: 1px solid #1e1e3a;
            text-align: center;
        }

        .status { font-size: 14px; color: #6a6a8c; }
        .status.active { color: #8a4a9c; }
        .status.warming { color: #9c8a4a; }
        .status.error { color: #c05050; }

        .transcript-bar {
            padding: 12px 24px;
            background: #0e0e22;
            border-top: 1px solid #1e1e3a;
            max-height: 80px;
            overflow-y: auto;
            font-size: 13px;
            color: #5a5a7c;
            line-height: 1.5;
        }

        .mic-indicator {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #3a3a5c;
            display: inline-block;
            margin-right: 8px;
        }

        .mic-indicator.listening {
            background: #e04040;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            display: inline-block;
            width: 10px; height: 10px;
            border: 2px solid #4a9c4a;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        .story-panel {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 26, 0.95);
            z-index: 10;
            padding: 40px;
            overflow-y: auto;
        }

        .story-panel.visible { display: block; }

        .story-text {
            font-size: 22px;
            line-height: 1.8;
            color: #c8c8e0;
            max-width: 640px;
            margin: 0 auto;
        }

        .story-text p { margin-bottom: 16px; }

        .close-story {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 11;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NarrateVision</h1>
        <div class="controls">
            <button class="btn warmup" id="warmupBtn" onclick="warmUp()">Load Models</button>
            <button class="btn story" onclick="toggleStory()">Read a Story</button>
            <button class="btn" id="micBtn" onclick="toggleMic()" disabled>
                <span class="mic-indicator" id="micDot"></span>
                Start Listening
            </button>
        </div>
    </div>

    <div class="main">
        <div class="canvas-wrap">
            <img id="illustration" alt="" />
            <div class="placeholder" id="placeholder">
                Click "Load Models" to warm up.<br>
                Then start listening and read aloud.
            </div>
        </div>

        <div class="story-panel" id="storyPanel">
            <button class="btn close-story" onclick="toggleStory()">Close</button>
            <div class="story-text" id="storyContent"></div>
        </div>
    </div>

    <div class="transcript-bar" id="transcript"></div>

    <div class="footer">
        <div class="status" id="status">Click "Load Models" to get ready.</div>
    </div>

    <script>
    const COMFY = 'http://127.0.0.1:8188';
    const COMFY_WS = 'ws://127.0.0.1:8188/ws';
    const CLIENT_ID = crypto.randomUUID();

    const SCENE_COOLDOWN = 5000;
    const MIN_WORDS = 8;
    const STYLE = 'storybook illustration, watercolor style, detailed, warm lighting';
    const NEG = 'blurry, ugly, deformed, text, watermark, low quality';

    const KEYWORDS = {
        settings: ['forest','castle','mountain','ocean','sea','river','lake','village','city','cave','desert','garden','house','room','sky','field','road','bridge','tower','palace','church','school','market','beach','island','valley','hill','cliff','dungeon','temple','library','kitchen','bedroom','street','lighthouse','harbour','boat','ship','stairs','window'],
        characters: ['king','queen','prince','princess','knight','dragon','witch','wizard','fairy','giant','monster','wolf','bear','fox','rabbit','cat','dog','bird','horse','lion','tiger','child','boy','girl','man','woman','old man','old woman','soldier','pirate','thief','angel','demon','ghost','fisherman','keeper','seagull'],
        actions: ['running','flying','swimming','fighting','sleeping','walking','dancing','singing','crying','laughing','riding','climbing','falling','hiding','searching','eating','drinking','reading','writing','building','sailing','struggling','smiling','watching'],
        atmosphere: ['dark','bright','stormy','sunny','rainy','snowy','foggy','moonlit','starry','golden','shadowy','misty','cold','warm','magical','mysterious','peaceful','scary','calm','churning']
    };

    const STORY = `The old lighthouse keeper climbed the winding stone stairs as the storm gathered over the dark ocean. Rain hammered the windows and lightning split the sky above the rocky cliff.

At the top of the tower, she lit the great lamp and its golden beam swept across the churning sea. Far below, waves crashed against the jagged rocks, sending white spray high into the air.

Through her telescope she spotted a small fishing boat, tossed like a leaf on the mountainous waves. The boat's sail was torn and the fisherman was struggling against the wind and the rain.

She rang the great brass bell three times. The deep sound echoed across the stormy bay, cutting through the howling wind. In the village below, lights flickered on in cottage windows.

The fisherman heard the bell and turned his boat toward the light. Slowly, painfully, he navigated through the rocks. The lighthouse beam guided him like a bright golden path across the dark water.

As the boat reached the harbour, the old woman smiled and poured herself a cup of tea in the warm kitchen at the base of the tower. The cat on the windowsill watched the storm pass, and stars began to appear through the breaking clouds.

By morning the sea was calm and blue. Seagulls circled the lighthouse in the bright sunshine. The fisherman walked up the cliff path carrying a basket of fresh fish, a gift for the keeper who had saved his life in the dark and stormy night.`;

    // -- State --
    let warmedUp = false;
    let listening = false;
    let recognition = null;
    let generating = false;
    let lastGenTime = 0;
    let lastPrompt = null;
    let sentences = [];
    let comfyWs = null;

    // -- ComfyUI workflow --
    function makeWorkflow(prompt) {
        return {
            "3": {
                class_type: "KSampler",
                inputs: {
                    seed: Math.floor(Math.random() * 2**32),
                    steps: 1, cfg: 1.0,
                    sampler_name: "euler", scheduler: "normal",
                    denoise: 1.0,
                    model: ["10", 0],
                    positive: ["6", 0], negative: ["7", 0],
                    latent_image: ["5", 0]
                }
            },
            "4": {
                class_type: "CheckpointLoaderSimple",
                inputs: { ckpt_name: "v1-5-pruned-emaonly-fp16.safetensors" }
            },
            "5": {
                class_type: "EmptyLatentImage",
                inputs: { width: 512, height: 512, batch_size: 1 }
            },
            "6": {
                class_type: "CLIPTextEncode",
                inputs: { text: prompt, clip: ["10", 1] }
            },
            "7": {
                class_type: "CLIPTextEncode",
                inputs: { text: NEG, clip: ["10", 1] }
            },
            "8": {
                class_type: "VAEDecode",
                inputs: { samples: ["3", 0], vae: ["4", 2] }
            },
            "9": {
                class_type: "SaveImage",
                inputs: { filename_prefix: "narrate", images: ["8", 0] }
            },
            "10": {
                class_type: "LoraLoader",
                inputs: {
                    lora_name: "Hyper-SD15-1step-lora.safetensors",
                    strength_model: 1.0, strength_clip: 1.0,
                    model: ["4", 0], clip: ["4", 1]
                }
            }
        };
    }

    // -- ComfyUI API (direct from browser) --
    async function queuePrompt(promptText) {
        const resp = await fetch(`${COMFY}/prompt`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt: makeWorkflow(promptText),
                client_id: CLIENT_ID
            })
        });
        const data = await resp.json();
        return data.prompt_id;
    }

    async function getImage(promptId) {
        const resp = await fetch(`${COMFY}/history/${promptId}`);
        const history = await resp.json();
        if (!history[promptId]) return null;

        const outputs = history[promptId].outputs || {};
        for (const nodeId in outputs) {
            const images = outputs[nodeId].images;
            if (images && images.length > 0) {
                const img = images[0];
                const url = `${COMFY}/view?filename=${encodeURIComponent(img.filename)}&subfolder=${encodeURIComponent(img.subfolder || '')}&type=${encodeURIComponent(img.type || 'output')}`;
                return url;
            }
        }
        return null;
    }

    function connectComfyWs() {
        comfyWs = new WebSocket(`${COMFY_WS}?clientId=${CLIENT_ID}`);
        comfyWs.onclose = () => setTimeout(connectComfyWs, 3000);
        comfyWs.onerror = () => {};
    }

    function waitForCompletion(promptId) {
        return new Promise((resolve) => {
            function handler(event) {
                if (typeof event.data !== 'string') return;
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'progress') {
                        setStatus(`Rendering step ${msg.data.value}/${msg.data.max}...`, 'active');
                    }
                    if (msg.type === 'executing' && msg.data.node === null && msg.data.prompt_id === promptId) {
                        comfyWs.removeEventListener('message', handler);
                        resolve();
                    }
                } catch (e) {}
            }
            comfyWs.addEventListener('message', handler);
        });
    }

    async function generateImage(promptText) {
        const promptId = await queuePrompt(promptText);
        await waitForCompletion(promptId);
        return await getImage(promptId);
    }

    // -- Scene extraction --
    function extractScene(texts) {
        const combined = texts.slice(-3).join(' ').toLowerCase();
        const found = {};
        for (const [cat, words] of Object.entries(KEYWORDS)) {
            found[cat] = words.filter(w => combined.includes(w));
        }

        if (!found.settings.length && !found.characters.length) return null;

        const parts = [];
        if (found.atmosphere.length) parts.push(found.atmosphere.join(', '));
        if (found.settings.length) parts.push(found.settings.join(', '));
        if (found.characters.length) {
            let s = found.characters.join(', ');
            if (found.actions.length) s += ' ' + found.actions.join(', ');
            parts.push(s);
        }

        return `${STYLE}, ${parts.join(', ')}`;
    }

    // -- Warm-up --
    async function warmUp() {
        const btn = document.getElementById('warmupBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Loading...';
        setStatus('Loading models into memory (first run takes 15-30s)...', 'warming');

        try {
            // Check ComfyUI is reachable
            await fetch(`${COMFY}/system_stats`);
        } catch (e) {
            btn.disabled = false;
            btn.textContent = 'Retry Load';
            setStatus('Cannot reach ComfyUI at localhost:8188. Run the launch script first.', 'error');
            return;
        }

        try {
            connectComfyWs();
            // Wait for ws to open
            await new Promise((resolve, reject) => {
                const check = setInterval(() => {
                    if (comfyWs.readyState === WebSocket.OPEN) {
                        clearInterval(check);
                        resolve();
                    }
                }, 200);
                setTimeout(() => { clearInterval(check); reject(new Error('ws timeout')); }, 5000);
            });

            // Run throwaway generation to load models
            const url = await generateImage('a simple test, solid blue background');
            if (url) {
                warmedUp = true;
                btn.classList.add('ready');
                btn.disabled = true;
                btn.textContent = 'Models Ready';
                document.getElementById('micBtn').disabled = false;
                document.getElementById('placeholder').innerHTML =
                    'Models loaded. Click "Start Listening" and read aloud.';
                setStatus('Ready. Click "Start Listening" to begin.');
            } else {
                throw new Error('No image returned');
            }
        } catch (e) {
            console.error('Warmup error:', e);
            btn.disabled = false;
            btn.textContent = 'Retry Load';
            setStatus('Failed to load models: ' + e.message, 'error');
        }
    }

    // -- Speech + generation loop --
    async function onTranscript(text) {
        if (!text || text.split(' ').length < 3) return;

        sentences.push(text);
        const el = document.getElementById('transcript');
        el.textContent += text + ' ';
        el.scrollTop = el.scrollHeight;

        const now = Date.now();
        if (now - lastGenTime < SCENE_COOLDOWN || generating) return;

        const totalWords = sentences.slice(-3).reduce((n, s) => n + s.split(' ').length, 0);
        if (totalWords < MIN_WORDS) return;

        const prompt = extractScene(sentences);
        if (!prompt || prompt === lastPrompt) return;

        generating = true;
        lastPrompt = prompt;
        lastGenTime = now;

        setStatus(`Illustrating: ${prompt.slice(0, 60)}...`, 'active');

        try {
            const url = await generateImage(prompt);
            if (url) {
                const img = document.getElementById('illustration');
                img.src = url;
                img.classList.add('visible');
                document.getElementById('placeholder').style.display = 'none';
                setStatus('Listening... Keep reading.');
            }
        } catch (e) {
            console.error('Generation error:', e);
            setStatus('Generation error. Keep reading, will retry.');
        }

        generating = false;
    }

    function toggleMic() {
        listening ? stopListening() : startListening();
    }

    function startListening() {
        if (!warmedUp) { setStatus('Load models first.'); return; }

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setStatus('Speech recognition not supported. Use Chrome or Edge.'); return; }

        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) onTranscript(e.results[i][0].transcript);
            }
        };
        recognition.onend = () => { if (listening) recognition.start(); };
        recognition.onerror = (e) => {
            if (e.error === 'not-allowed') {
                setStatus('Microphone access denied. Allow it in browser settings.', 'error');
                stopListening();
            }
        };

        recognition.start();
        listening = true;

        document.getElementById('micBtn').classList.add('active');
        document.getElementById('micBtn').innerHTML =
            '<span class="mic-indicator listening"></span> Listening...';
        setStatus('Listening... Start reading aloud.');
        document.getElementById('transcript').textContent = '';
    }

    function stopListening() {
        listening = false;
        if (recognition) { recognition.stop(); recognition = null; }
        document.getElementById('micBtn').classList.remove('active');
        document.getElementById('micBtn').innerHTML =
            '<span class="mic-indicator"></span> Start Listening';
        setStatus('Stopped.');
    }

    function toggleStory() {
        const p = document.getElementById('storyPanel');
        if (p.classList.contains('visible')) {
            p.classList.remove('visible');
        } else {
            document.getElementById('storyContent').innerHTML =
                STORY.split('\n\n').map(s => `<p>${s}</p>`).join('');
            p.classList.add('visible');
        }
    }

    function setStatus(text, cls) {
        const el = document.getElementById('status');
        el.textContent = text;
        el.className = cls ? `status ${cls}` : 'status';
    }
    </script>
</body>
</html>
